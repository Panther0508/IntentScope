services:
  - type: web
    name: intentscope
    env: python
    region: oregon
    buildCommand: cd . && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    runtime: python-3.12
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: FLASK_DEBUG
        value: "false"
      - key: SECRET_KEY
        value: "change-this-in-production-use-environment-variable"
    autoDeploy: true
    healthCheckPath: /health
